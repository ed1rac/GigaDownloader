name: GigaDownloader Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Windows
            runner: windows-latest
            container: null
          
          - os: Linux
            runner: ubuntu-22.04
            container: ubuntu:20.04
          
          - os: macOS
            runner: macos-latest
            container: null

    steps:
    - name: 📥 Clonar Código Fonte
      uses: actions/checkout@v4

    # Linux: Usar Python do container, não do setup-python
    - name: 🐧 Configurar Python (Linux - do container)
      if: runner.os == 'Linux'
      run: |
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          python3 \
          python3-pip \
          python3-tk \
          python3-dev \
          build-essential

    # Windows e macOS: Usar setup-python normalmente
    - name: 🐍 Configurar Python (Windows/macOS)
      if: runner.os != 'Linux'
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Instalar Dependências (Comuns)
      run: |
        python3 -m pip install --upgrade pip
        pip3 install -r requirements.txt
        pip3 install pyinstaller

    - name: ⚙️ Compilar com PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name "GigaDownloader" ytdownloader.py

    - name: 🔤 Renomear Arquivo Windows
      if: runner.os == 'Windows'
      run: |
        Move-Item -Path dist\GigaDownloader.exe -Destination dist\GigaDownloader-Windows.exe

    - name: 🔤 Renomear Arquivo Linux/Mac
      if: runner.os != 'Windows'
      run: |
        mv dist/GigaDownloader dist/GigaDownloader-${{ matrix.os }}

    - name: 📦 Guardar Artefatos Localmente (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: GigaDownloader-${{ matrix.os }}-build
        path: dist/GigaDownloader-*

  release:
    name: Publicar Release Oficial
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: 📥 Baixar Artefatos Compilados
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: 🚀 Criar Release e Anexar Executáveis
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
